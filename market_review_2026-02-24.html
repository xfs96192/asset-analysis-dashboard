        ];

        // 绘制迷你图
        function drawSparkline(data, color = '#667eea') {
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const width = 100;
            const height = 30;
            const points = data.map((v, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((v - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');
            return `<svg class="sparkline" viewBox="0 0 100 30"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
        }

        // 渲染权益表
        function renderEquity() {
            const tbody = document.getElementById('equityTable');
            tbody.innerHTML = equityData.map(item => {
                const color = item.percentile > 80 ? 'text-red-600' : item.percentile > 50 ? 'text-orange-600' : 'text-green-600';
                return `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-medium">${item.name}</td>
                    <td class="p-3 text-right">${item.value.toLocaleString()}</td>
                    <td class="p-3 text-right ${color} font-bold">${item.percentile.toFixed(1)}%</td>
                    <td class="p-3 text-right">${item.change}</td>
                    <td class="p-3">${drawSparkline(item.trend)}</td>
                </tr>`;
            }).join('');
        }

        // 渲染债券表

            const tbody = document.getElementById('bondTable');

        // 渲染外汇表
